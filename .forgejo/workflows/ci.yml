name: ci

on: [push, pull_request]

jobs:
  build:
    # Adjust to match a label your Forgejo runner advertises.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
