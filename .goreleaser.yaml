version: 2

project_name: salvage

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/salvage
    binary: salvage
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X salvage.sh/internal/version.Version={{ .Version }}
      - -X salvage.sh/internal/version.Commit={{ .ShortCommit }}
      - -X salvage.sh/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Release notes come from the curated CHANGELOG.md section for the tag
# (spec 0034 R4; extracted by the release workflow) — never from the mirrored
# commit log, which is a curated snapshot and not a user-facing narrative.
changelog:
  disable: true
